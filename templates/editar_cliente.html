{% extends "base.html" %}
{% block titulo %}Editar Cliente{% endblock %}
{% block contenido %}
<h2>✏️ Editar Cliente</h2>
<div class="dash-panel" style="max-width:500px;margin-top:20px">
    <div class="dash-panel-body">
        <form method="POST">
            <label>Nombre</label>
            <input type="text" name="nombre" value="{{ cliente.nombre }}" required>
            <label>Teléfono</label>
            <input type="text" name="telefono" value="{{ cliente.telefono }}" required>
            <label>Correo</label>
            <input type="email" name="correo" value="{{ cliente.correo }}" required>
            <div style="display:flex;gap:10px;margin-top:8px">
                <button type="submit">Guardar Cambios</button>
                <a href="/clientes" class="btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
